  <text x="307" y="307.5" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#0a2015">45€</text>

  <!-- Mini producto 3 -->
  <rect x="410" y="220" width="104" height="110" rx="7" fill="url(#to-card)" stroke="#2a1f50" stroke-width="1"/>
  <rect x="418" y="228" width="88" height="54" rx="4" fill="#1a0c0c"/>
  <rect x="432" y="238" width="60" height="36" rx="3" fill="#281818"/>
