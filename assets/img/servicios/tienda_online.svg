  <rect x="44" y="118" width="8" height="8" rx="2" fill="#3a2870"/>
  <rect x="58" y="120" width="55" height="5" rx="2" fill="#4a3a80" fill-opacity="0.6"/>

  <rect x="44" y="136" width="8" height="8" rx="2" fill="#3a2870"/>
  <rect x="58" y="138" width="72" height="5" rx="2" fill="#4a3a80" fill-opacity="0.6"/>

  <rect x="44" y="154" width="8" height="8" rx="2" fill="#3a2870"/>
