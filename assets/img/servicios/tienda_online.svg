<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Tienda online profesional en Málaga">
  <defs>
    <linearGradient id="to-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#130d25"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </linearGradient>
    <linearGradient id="to-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#9b7bff"/>
    </linearGradient>
    <linearGradient id="to-green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38d996"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="to-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1430"/>
      <stop offset="100%" stop-color="#110e22"/>
    </linearGradient>
    <filter id="to-shadow">
