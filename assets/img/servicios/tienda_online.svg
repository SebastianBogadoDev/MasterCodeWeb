  <text x="451" y="179.5" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#fff">199€</text>
  <text x="446" y="192" font-family="system-ui,sans-serif" font-size="8" fill="#f59e0b" fill-opacity="0.9">★★★★☆</text>

