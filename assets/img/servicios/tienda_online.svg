  <rect x="186" y="228" width="88" height="54" rx="4" fill="#131024"/>
  <rect x="200" y="238" width="60" height="36" rx="3" fill="#1a1438"/>
  <rect x="202" y="240" width="56" height="5" rx="1" fill="#7c5cff" fill-opacity="0.3"/>
  <rect x="202" y="248" width="56" height="24" rx="2" fill="#0a0818"/>
