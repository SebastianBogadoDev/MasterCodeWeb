<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Diseño web profesional en Málaga">
  <defs>
    <linearGradient id="dw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="dw-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d6cf2"/>
      <stop offset="100%" stop-color="#4aa3ff"/>
    </linearGradient>
    <linearGradient id="dw-purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6cf2" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="dw-hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d6cf2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d6cf2" stop-opacity="0"/>
    </linearGradient>
    <filter id="dw-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="dw-screen-clip">
      <rect x="60" y="55" width="480" height="295" rx="6"/>
    </clipPath>
  </defs>

  <!-- Fondo principal -->
  <rect width="600" height="400" fill="url(#dw-bg)"/>

  <!-- Halo azul de fondo -->
  <ellipse cx="300" cy="180" rx="280" ry="180" fill="#0d6cf2" fill-opacity="0.06"/>

  <!-- Sombra del monitor -->
  <ellipse cx="300" cy="370" rx="200" ry="14" fill="#000" fill-opacity="0.45"/>

  <!-- Monitor - cuerpo -->
  <rect x="55" y="48" width="490" height="308" rx="10" fill="#0e1520" stroke="#1e3a5c" stroke-width="1.5"/>

  <!-- Monitor - barra superior (chrome) -->
  <rect x="55" y="48" width="490" height="28" rx="10" fill="#111d2e"/>
  <rect x="55" y="62" width="490" height="14" fill="#111d2e"/>

  <!-- Botones del browser (traffic lights) -->
  <circle cx="79" cy="62" r="5" fill="#ff5f57" fill-opacity="0.85"/>
  <circle cx="96" cy="62" r="5" fill="#ffbd2e" fill-opacity="0.85"/>
  <circle cx="113" cy="62" r="5" fill="#28c840" fill-opacity="0.85"/>

  <!-- Barra de URL -->
  <rect x="155" y="54" width="290" height="16" rx="8" fill="#1a2a3e" stroke="#2a3f5a" stroke-width="1"/>
  <text x="300" y="65.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#4a7ca8">mastercodeweb.com</text>

  <!-- Icono candado -->
  <text x="168" y="66" font-family="system-ui,sans-serif" font-size="8" fill="#38d996">🔒</text>

  <!-- Contenido de la web simulada -->
  <g clip-path="url(#dw-screen-clip)">

    <!-- Fondo pantalla -->
    <rect x="60" y="76" width="480" height="274" fill="#080d16"/>
    <rect x="60" y="76" width="480" height="274" fill="url(#dw-hero)"/>

    <!-- Header simulado -->
    <rect x="60" y="76" width="480" height="36" fill="#0c1424" fill-opacity="0.9"/>
    <rect x="60" y="76" width="480" height="36" fill="none" stroke="#1e3a5c" stroke-width="1" stroke-dasharray="0"/>

    <!-- Logo texto en header -->
    <rect x="80" y="87" width="60" height="10" rx="3" fill="url(#dw-blue)"/>
    <rect x="80" y="87" width="38" height="10" rx="3" fill="#0d6cf2"/>
    <rect x="120" y="87" width="22" height="10" rx="3" fill="#4aa3ff"/>

    <!-- Nav items -->
    <rect x="240" y="89" width="28" height="6" rx="3" fill="#2a4a6e"/>
    <rect x="278" y="89" width="35" height="6" rx="3" fill="#2a4a6e"/>
    <rect x="323" y="89" width="24" height="6" rx="3" fill="#2a4a6e"/>
    <rect x="357" y="89" width="30" height="6" rx="3" fill="#2a4a6e"/>

    <!-- CTA button header -->
    <rect x="406" y="85" width="54" height="14" rx="7" fill="url(#dw-blue)"/>
    <rect x="408" y="89" width="50" height="6" rx="3" fill="#fff" fill-opacity="0.3"/>

    <!-- HERO section -->
    <rect x="60" y="112" width="480" height="90" fill="url(#dw-hero)"/>

    <!-- Badge hero -->
    <rect x="207" y="122" width="86" height="10" rx="5" fill="#0d6cf2" fill-opacity="0.15" stroke="#0d6cf2" stroke-width="0.5" stroke-opacity="0.4"/>
    <rect x="222" y="125" width="56" height="4" rx="2" fill="#4aa3ff" fill-opacity="0.7"/>

    <!-- H1 simulado -->
    <rect x="160" y="140" width="280" height="14" rx="4" fill="#fff" fill-opacity="0.85"/>
    <rect x="190" y="160" width="220" height="10" rx="4" fill="#fff" fill-opacity="0.5"/>

    <!-- Descripcion -->
    <rect x="175" y="178" width="250" height="5" rx="2" fill="#4a7ca8" fill-opacity="0.7"/>
    <rect x="190" y="187" width="220" height="5" rx="2" fill="#4a7ca8" fill-opacity="0.5"/>
    <rect x="200" y="196" width="200" height="5" rx="2" fill="#4a7ca8" fill-opacity="0.35"/>

    <!-- CTA buttons hero -->
    <rect x="192" y="208" width="90" height="18" rx="9" fill="url(#dw-blue)" filter="url(#dw-glow)"/>
    <rect x="295" y="208" width="80" height="18" rx="9" fill="none" stroke="#2a4a6e" stroke-width="1"/>
    <rect x="200" y="214" width="74" height="6" rx="3" fill="#fff" fill-opacity="0.4"/>
    <rect x="302" y="214" width="66" height="6" rx="3" fill="#4a7ca8" fill-opacity="0.6"/>

    <!-- Separador -->
    <rect x="60" y="234" width="480" height="1" fill="#1e3a5c" fill-opacity="0.6"/>

    <!-- SECCIÓN SERVICIOS (cards) -->
    <rect x="60" y="234" width="480" height="116" fill="#080d16"/>

    <!-- Título sección -->
    <rect x="225" y="244" width="150" height="8" rx="3" fill="#2a4a6e"/>

    <!-- Card 1 -->
    <rect x="78" y="260" width="126" height="72" rx="6" fill="#0e1928" stroke="#1e3a5c" stroke-width="1"/>
    <rect x="88" y="270" width="30" height="30" rx="6" fill="#0d6cf2" fill-opacity="0.15"/>
    <rect x="95" y="278" width="16" height="14" rx="3" fill="url(#dw-blue)" fill-opacity="0.8"/>
    <rect x="88" y="306" width="80" height="6" rx="3" fill="#4a7ca8" fill-opacity="0.8"/>
    <rect x="88" y="316" width="66" height="4" rx="2" fill="#2a4a6e"/>
    <rect x="88" y="322" width="52" height="4" rx="2" fill="#2a4a6e"/>

    <!-- Card 2 (highlight) -->
    <rect x="218" y="258" width="126" height="76" rx="6" fill="#0e1928" stroke="#0d6cf2" stroke-width="1.5"/>
    <rect x="228" y="268" width="30" height="30" rx="6" fill="#7c5cff" fill-opacity="0.15"/>
    <rect x="234" y="276" width="18" height="16" rx="3" fill="#7c5cff" fill-opacity="0.8"/>
    <rect x="228" y="304" width="80" height="6" rx="3" fill="#c8b8ff" fill-opacity="0.7"/>
    <rect x="228" y="314" width="66" height="4" rx="2" fill="#3a3a6e"/>
    <rect x="228" y="320" width="52" height="4" rx="2" fill="#3a3a6e"/>
    <!-- Badge popular -->
    <rect x="248" y="252" width="46" height="10" rx="5" fill="url(#dw-blue)"/>
    <rect x="254" y="255" width="34" height="4" rx="2" fill="#fff" fill-opacity="0.5"/>

    <!-- Card 3 -->
    <rect x="358" y="260" width="126" height="72" rx="6" fill="#0e1928" stroke="#1e3a5c" stroke-width="1"/>
    <rect x="368" y="270" width="30" height="30" rx="6" fill="#38d996" fill-opacity="0.12"/>
    <rect x="375" y="277" width="16" height="16" rx="3" fill="#38d996" fill-opacity="0.7"/>
    <rect x="368" y="306" width="80" height="6" rx="3" fill="#4a7ca8" fill-opacity="0.8"/>
    <rect x="368" y="316" width="66" height="4" rx="2" fill="#2a4a6e"/>
    <rect x="368" y="322" width="52" height="4" rx="2" fill="#2a4a6e"/>

  </g>

  <!-- Soporte monitor -->
  <rect x="278" y="356" width="44" height="10" rx="2" fill="#0e1520" stroke="#1e3a5c" stroke-width="1"/>
  <rect x="256" y="365" width="88" height="5" rx="2.5" fill="#0e1520" stroke="#1e3a5c" stroke-width="1"/>

  <!-- Etiqueta de calidad -->
  <rect x="420" y="20" width="130" height="22" rx="11" fill="#0d6cf2" fill-opacity="0.12" stroke="#0d6cf2" stroke-opacity="0.25" stroke-width="1"/>
  <text x="485" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#4aa3ff" letter-spacing="1">DISEÑO PREMIUM</text>

</svg>
