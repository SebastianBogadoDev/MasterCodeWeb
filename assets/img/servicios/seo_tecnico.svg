<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="SEO técnico profesional en Málaga">
  <defs>
    <linearGradient id="seo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1a15"/>
      <stop offset="100%" stop-color="#080f0a"/>
    </linearGradient>
    <linearGradient id="seo-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38d996"/>
      <stop offset="100%" stop-color="#20b97a"/>
    </linearGradient>
    <linearGradient id="seo-chart" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#38d996" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#38d996" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="seo-bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#38d996"/>
      <stop offset="100%" stop-color="#5ef5b2"/>
    </linearGradient>
    <filter id="seo-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="seo-clip">
      <rect x="30" y="30" width="540" height="340" rx="12"/>
    </clipPath>
  </defs>

  <!-- Fondo principal -->
  <rect width="600" height="400" fill="url(#seo-bg)"/>

  <!-- Halo verde de fondo -->
  <ellipse cx="300" cy="200" rx="260" ry="170" fill="#38d996" fill-opacity="0.04"/>
  <ellipse cx="480" cy="320" rx="120" ry="80" fill="#38d996" fill-opacity="0.06"/>

  <!-- Panel principal -->
  <rect x="30" y="30" width="540" height="340" rx="12" fill="#0c1a12" stroke="#1a3d2a" stroke-width="1.5"/>

  <!-- Header del panel -->
  <rect x="30" y="30" width="540" height="36" rx="12" fill="#0f2018"/>
  <rect x="30" y="48" width="540" height="18" fill="#0f2018"/>

  <!-- Título del panel -->
  <text x="60" y="52" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#38d996" letter-spacing="1">SEO ANALYTICS</text>

  <!-- Indicador online -->
  <circle cx="520" cy="49" r="4" fill="#38d996"/>
  <text x="530" y="53" font-family="system-ui,sans-serif" font-size="8" fill="#38d996" fill-opacity="0.7">LIVE</text>

  <!-- ======= BARRA DE BÚSQUEDA ======= -->
  <rect x="50" y="80" width="320" height="32" rx="16" fill="#0a1f14" stroke="#1e4a30" stroke-width="1.5"/>
  <!-- Icono lupa -->
  <circle cx="72" cy="96" r="6" fill="none" stroke="#38d996" stroke-width="1.5"/>
  <line x1="76.5" y1="100.5" x2="81" y2="105" stroke="#38d996" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Texto de búsqueda -->
  <text x="90" y="100" font-family="system-ui,sans-serif" font-size="10" fill="#c8e8d4">diseño web Málaga</text>
  <!-- Cursor parpadeante -->
  <rect x="213" y="89" width="1.5" height="13" fill="#38d996" fill-opacity="0.9"/>

  <!-- Botón buscar -->
  <rect x="380" y="80" width="80" height="32" rx="16" fill="url(#seo-green)"/>
  <text x="420" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#0a1f14">BUSCAR</text>

  <!-- Posición actual badge -->
  <rect x="474" y="80" width="88" height="32" rx="8" fill="#38d996" fill-opacity="0.1" stroke="#38d996" stroke-opacity="0.3" stroke-width="1"/>
  <text x="518" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#38d996" fill-opacity="0.8">POSICIÓN</text>
  <text x="518" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="900" fill="#38d996">#1</text>

  <!-- ======= COLUMNA IZQUIERDA: Rankings ======= -->
  <!-- Título -->
  <text x="50" y="138" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#38d996" fill-opacity="0.7" letter-spacing="1">RANKING SERP</text>

  <!-- Resultado #1 (propio) -->
  <rect x="50" y="145" width="230" height="44" rx="6" fill="#0f2a1a" stroke="#38d996" stroke-width="1.5"/>
  <!-- Badge #1 -->
  <rect x="56" y="151" width="20" height="12" rx="3" fill="url(#seo-green)"/>
  <text x="66" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" font-weight="900" fill="#0a1f14">#1</text>
  <!-- URL -->
  <text x="82" y="160" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#38d996">mastercodeweb.com</text>
  <!-- Título snippet -->
  <rect x="56" y="165" width="180" height="5" rx="2" fill="#38d996" fill-opacity="0.4"/>
  <rect x="56" y="174" width="140" height="4" rx="2" fill="#2a5a3a" fill-opacity="0.6"/>
  <!-- Arrow trend -->
  <polygon points="238,153 246,157 238,161" fill="#38d996"/>

  <!-- Resultado #2 -->
  <rect x="50" y="196" width="230" height="36" rx="6" fill="#0c1a12" stroke="#1e3d28" stroke-width="1"/>
  <rect x="56" y="202" width="20" height="12" rx="3" fill="#1e3d28"/>
  <text x="66" y="211" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#4a9a6a">#2</text>
  <rect x="82" y="204" width="130" height="5" rx="2" fill="#2a4a36" fill-opacity="0.8"/>
  <rect x="82" y="212" width="100" height="4" rx="2" fill="#1a3020"/>
  <rect x="82" y="219" width="120" height="4" rx="2" fill="#1a3020"/>

  <!-- Resultado #3 -->
  <rect x="50" y="239" width="230" height="36" rx="6" fill="#0c1a12" stroke="#1e3d28" stroke-width="1"/>
  <rect x="56" y="245" width="20" height="12" rx="3" fill="#1a2e20"/>
  <text x="66" y="254" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#3a7a52">#3</text>
  <rect x="82" y="247" width="110" height="5" rx="2" fill="#1e3028" fill-opacity="0.8"/>
  <rect x="82" y="255" width="130" height="4" rx="2" fill="#1a3020"/>
  <rect x="82" y="262" width="90" height="4" rx="2" fill="#1a3020"/>

  <!-- Resultado #4 -->
  <rect x="50" y="282" width="230" height="36" rx="6" fill="#0c1a12" stroke="#1e3d28" stroke-width="1"/>
  <rect x="56" y="288" width="20" height="12" rx="3" fill="#141e16"/>
  <text x="66" y="297" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#2a5a3a">#4</text>
  <rect x="82" y="290" width="120" height="5" rx="2" fill="#1a2820" fill-opacity="0.7"/>
  <rect x="82" y="298" width="90" height="4" rx="2" fill="#141e16"/>
  <rect x="82" y="305" width="110" height="4" rx="2" fill="#141e16"/>

  <!-- ======= COLUMNA DERECHA: Gráfico + métricas ======= -->

  <!-- Título gráfico -->
  <text x="302" y="138" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#38d996" fill-opacity="0.7" letter-spacing="1">TRÁFICO ORGÁNICO</text>

  <!-- Área del gráfico -->
  <rect x="302" y="145" width="258" height="120" rx="6" fill="#0a1810" stroke="#1e3d28" stroke-width="1"/>

  <!-- Grid lines del gráfico -->
  <line x1="302" y1="175" x2="560" y2="175" stroke="#1e3d28" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="302" y1="200" x2="560" y2="200" stroke="#1e3d28" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="302" y1="225" x2="560" y2="225" stroke="#1e3d28" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Área rellena del gráfico (polígono ascendente) -->
  <polygon points="312,255 332,248 355,240 378,232 400,218 422,205 445,190 468,175 490,162 512,152 535,145 555,138 555,265 312,265"
    fill="url(#seo-chart)"/>

  <!-- Línea del gráfico -->
  <polyline points="312,255 332,248 355,240 378,232 400,218 422,205 445,190 468,175 490,162 512,152 535,145 555,138"
    fill="none" stroke="#38d996" stroke-width="2" stroke-linejoin="round" filter="url(#seo-glow)"/>

  <!-- Punto final destacado -->
  <circle cx="555" cy="138" r="4" fill="#38d996" filter="url(#seo-glow)"/>
  <circle cx="555" cy="138" r="7" fill="#38d996" fill-opacity="0.2"/>

  <!-- Etiqueta del punto -->
  <rect x="525" y="124" width="38" height="12" rx="4" fill="#0f2a1a" stroke="#38d996" stroke-width="0.5"/>
  <text x="544" y="133" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#38d996">+247%</text>

  <!-- ======= MÉTRICAS ABAJO ======= -->
  <!-- Fila de KPIs -->
  <!-- KPI 1: Visitas -->
  <rect x="302" y="276" width="78" height="46" rx="6" fill="#0c1a12" stroke="#1e3d28" stroke-width="1"/>
  <text x="341" y="291" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#38d996" fill-opacity="0.7">VISITAS/MES</text>
  <text x="341" y="307" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="#38d996">4.2K</text>
  <text x="341" y="317" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#38d996" fill-opacity="0.5">↑ 18% este mes</text>

  <!-- KPI 2: Keywords -->
  <rect x="390" y="276" width="78" height="46" rx="6" fill="#0c1a12" stroke="#1e3d28" stroke-width="1"/>
  <text x="429" y="291" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#38d996" fill-opacity="0.7">KEYWORDS</text>
  <text x="429" y="307" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="#38d996">127</text>
  <text x="429" y="317" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#38d996" fill-opacity="0.5">en top 10</text>

  <!-- KPI 3: Score -->
  <rect x="478" y="276" width="82" height="46" rx="6" fill="#0c1a12" stroke="#38d996" stroke-width="1.5"/>
  <text x="519" y="291" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#38d996" fill-opacity="0.7">SEO SCORE</text>
  <text x="519" y="307" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="#38d996">98</text>
  <!-- Mini gauge -->
  <text x="519" y="317" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#38d996" fill-opacity="0.5">● ● ● ● ●</text>

  <!-- ======= BARRA INFERIOR: Core Web Vitals ======= -->
  <rect x="50" y="336" width="500" height="22" rx="6" fill="#0a1810" stroke="#1e3d28" stroke-width="1"/>
  <text x="70" y="350" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#38d996" fill-opacity="0.6" letter-spacing="0.5">CORE WEB VITALS:</text>
  <!-- LCP -->
  <circle cx="185" cy="347" r="4" fill="#38d996"/>
  <text x="193" y="351" font-family="system-ui,sans-serif" font-size="7" fill="#c8e8d4">LCP 1.2s</text>
  <!-- FID -->
  <circle cx="252" cy="347" r="4" fill="#38d996"/>
  <text x="260" y="351" font-family="system-ui,sans-serif" font-size="7" fill="#c8e8d4">FID 8ms</text>
  <!-- CLS -->
  <circle cx="312" cy="347" r="4" fill="#38d996"/>
  <text x="320" y="351" font-family="system-ui,sans-serif" font-size="7" fill="#c8e8d4">CLS 0.01</text>
  <!-- PageSpeed -->
  <circle cx="378" cy="347" r="4" fill="#38d996"/>
  <text x="386" y="351" font-family="system-ui,sans-serif" font-size="7" fill="#c8e8d4">PageSpeed 98/100</text>

  <!-- Etiqueta esquina -->
  <rect x="20" y="18" width="120" height="20" rx="10" fill="#38d996" fill-opacity="0.1" stroke="#38d996" stroke-opacity="0.25" stroke-width="1"/>
  <text x="80" y="31" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#38d996" letter-spacing="1">SEO TÉCNICO PRO</text>

</svg>
